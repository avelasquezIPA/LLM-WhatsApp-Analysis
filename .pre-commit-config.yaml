repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
        exclude: ^\.devcontainer/devcontainer\.json$
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: >-
          (?x)^(
            README\.md|
            documentation/PROYECTO\.md|
            documentation/Explicacion-ScriptLimpieza\.md|
            documentation/s41598-025-13560-9\.md|
            documentation/llm-whatsapp-pipeline\.md|
            do_files/.*\.do
          )$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        exclude: >-
          (?x)^(
            \.claude/|
            documentation/s41598-025-13560-9\.md|
            documentation/llm-whatsapp-pipeline\.md
          )$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        require_serial: true
        exclude: ^\.claude/
      - id: ruff-format
        types_or: [python, pyi, jupyter]
        exclude: ^\.claude/
