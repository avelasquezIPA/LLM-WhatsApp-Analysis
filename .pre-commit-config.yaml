repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
        exclude: ^\.devcontainer/devcontainer\.json$
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.24.1
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: >-
          (?x)^(
            README\.md|
            \.claude/.*|
            documentation/Programa/PROYECTO\.md|
            documentation/Process/Explicacion-ScriptLimpieza\.md|
            documentation/Papers/s41598-025-13560-9\.md|
            documentation/s41598-025-13560-9\.md|
            documentation/Process/llm-whatsapp-pipeline\.md|
            documentation/llm-whatsapp-pipeline\.md|
            documentation/Process/llm-anto-process\.md|
            documentation/Process/LLM-ResultsSummary\.md|
            documentation/Process/aplicacion-dedios-apapachar\.md|
            documentation/Programa/aplicacion-dedios-apapachar\.md|
            documentation/Papers/dedios-sanguineti-et-al-2025\.md|
            scripts/do_files/.*\.do|
            scripts/python_scripts/.*\.py
          )$

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2
        exclude: >-
          (?x)^(
            \.claude/.*|
            documentation/Papers/s41598-025-13560-9\.md|
            documentation/s41598-025-13560-9\.md|
            documentation/Process/llm-whatsapp-pipeline\.md|
            documentation/llm-whatsapp-pipeline\.md|
            documentation/Papers/dedios-sanguineti-et-al-2025\.md
          )$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        require_serial: true
        exclude: ^\.claude/
      - id: ruff-format
        types_or: [python, pyi, jupyter]
        exclude: ^\.claude/
